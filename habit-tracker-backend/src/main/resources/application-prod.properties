# ─── Production Configuration ─────────────────────────────────────────────
spring.profiles.active=prod

# ─── PostgreSQL Database ───────────────────────────────────────────────────
# These will be set via environment variables in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zenko}
spring.datasource.username=${DB_USERNAME:zenko_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA/Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ─── H2 Console disabled in prod ─────────────────────────────────────────
spring.h2.console.enabled=false

# ─── Server ───────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── Session ───────────────────────────────────────────────────────────────
server.servlet.session.timeout=7d
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=true  # Only over HTTPS

# ─── CORS ────────────────────────────────────────────────────────────────
# Configure allowed origins (set via env var)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
