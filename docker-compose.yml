version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zenko-postgres
    environment:
      POSTGRES_DB: zenko
      POSTGRES_USER: zenko_user
      POSTGRES_PASSWORD: habit123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenko_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./habit-tracker-backend
    container_name: zenko-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/zenko
      DB_USERNAME: zenko_user
      DB_PASSWORD: habit123
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080,http://localhost:3001
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
