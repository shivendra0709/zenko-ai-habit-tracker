# ─── Server ─────────────────────────────────────────
server.port=8080

# ─── H2 Database (file-based — data persists between restarts) ──
spring.datasource.url=jdbc:h2:file:./data/zenko;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=habit123

# ─── JPA ────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── H2 Console (visit http://localhost:8080/h2-console) ─────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Session ────────────────────────────────────────
server.servlet.session.timeout=7d
server.servlet.session.cookie.same-site=lax

# ─── Google OAuth Client ID ──────────────────────────────────────
google.client-id=1030369850903-aqsp9h3spff8b8r5gfec13eg83pk0k6g.apps.googleusercontent.com

# ─── Gemini AI API Key ───────────────────────────────────────────
# Get your FREE key at: https://aistudio.google.com/app/apikey
# IMPORTANT: Set via environment variable GEMINI_API_KEY for production!
# Without it, the app uses smart demo responses automatically.
# gemini.api.key=YOUR_API_KEY_HERE

# ─── OpenRouter AI ───────────────────────────────────────────────
# GPT-3.5 Turbo via OpenRouter
# Get your API key: https://openrouter.ai/keys
# IMPORTANT: Set via environment variable OPENROUTER_API_KEY!
# openrouter.api.key=YOUR_OPENROUTER_API_KEY_HERE
openrouter.model=openai/gpt-3.5-turbo

# ─── Logging ────────────────────────────────────────
logging.level.com.zenko=INFO
logging.level.org.springframework.security=WARN
