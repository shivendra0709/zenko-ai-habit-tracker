<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="date-display">
                    <span id="currentDate" class="date"></span>
                    <span class="day" id="currentDay"></span>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <section class="dashboard">
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="stat-icon">📋</div>
                    <div class="stat-content">
                        <span class="stat-value" id="totalTasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                </div>
                <div class="stat-card active">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-content">
                        <span class="stat-value" id="activeTasks">0</span>
                        <span class="stat-label">Active</span>
                    </div>
                </div>
                <div class="stat-card completed">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <span class="stat-value" id="completedTasks">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                </div>
            </div>

            <!-- Progress Card -->
            <div class="progress-card">
                <div class="progress-header">
                    <span class="progress-title">Today's Progress</span>
                    <span class="progress-percentage" id="progressPercentage">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p class="progress-subtitle" id="progressText">Complete tasks to see progress</p>
            </div>
        </section>

        <!-- Quick Add -->
        <section class="quick-add">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
                <button id="addBtn" class="add-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </section>

        <!-- Filter Tabs -->
        <section class="tabs-section">
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">
                    <span class="tab-icon">📁</span>
                    <span class="tab-text">All</span>
                    <span class="tab-count" id="allCount">0</span>
                </button>
                <button class="tab" data-filter="active">
                    <span class="tab-icon">🔜</span>
                    <span class="tab-text">Active</span>
                    <span class="tab-count" id="activeCount">0</span>
                </button>
                <button class="tab" data-filter="completed">
                    <span class="tab-icon">✔️</span>
                    <span class="tab-text">Done</span>
                    <span class="tab-count" id="completedCount">0</span>
                </button>
            </div>
        </section>

        <!-- Todo List -->
        <section class="todo-section">
            <ul id="todoList" class="todo-list"></ul>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">✨</div>
                <h3>No tasks yet</h3>
                <p>Add your first task above!</p>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <span class="footer-text">Swipe to delete • Tap to complete</span>
            <button class="clear-btn" id="clearCompleted">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Clear Done
            </button>
        </footer>
    </div>

    <script src="todo.js"></script>
</body>
</html>
